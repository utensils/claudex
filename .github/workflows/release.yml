name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to (re)build (e.g. v0.2.0). Required."
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both macOS targets run on macos-14 (Apple Silicon). The x86_64
          # build is a cross-compile from aarch64 — Apple's toolchain ships
          # both arches, so `rustup target add` is all we need. `macos-13`
          # (Intel runner) was retired by GitHub; hanging waits are the
          # symptom when `runs-on: macos-13` is requested.
          - os: macos-14
            target: aarch64-apple-darwin
            asset: claudex-aarch64-apple-darwin.tar.gz
          - os: macos-14
            target: x86_64-apple-darwin
            asset: claudex-x86_64-apple-darwin.tar.gz
          # Pin to ubuntu-22.04 so the glibc floor of our Linux binaries stays
          # put across GitHub runner image upgrades. Prebuilt assets should
          # keep running on distros that ship older glibc.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            asset: claudex-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            asset: claudex-aarch64-unknown-linux-gnu.tar.gz
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Belt-and-braces: ensure the cross target's std is actually present.
      # On cross-target macOS builds we've seen `rustup toolchain install
      # --target` not materialize std (E0463: can't find crate for `core`),
      # so force-add it explicitly.
      - name: Add cross target
        run: rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}
          cache-on-failure: true

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --locked

      - name: Ad-hoc code sign (macOS)
        if: runner.os == 'macOS'
        run: codesign -s - target/${{ matrix.target }}/release/claudex

      - name: Strip binary
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            strip target/${{ matrix.target }}/release/claudex
          else
            strip --strip-all target/${{ matrix.target }}/release/claudex
          fi

      - name: Package
        run: tar -czf ${{ matrix.asset }} -C target/${{ matrix.target }}/release claudex

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: ${{ matrix.asset }}

  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: cd artifacts && sha256sum *.tar.gz > SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          # Only promote to "latest" on an actual tag push. Workflow_dispatch
          # rebuilds of historical tags must not demote newer releases.
          make_latest: ${{ startsWith(github.ref, 'refs/tags/v') }}
          generate_release_notes: true
          files: |
            artifacts/claudex-aarch64-apple-darwin.tar.gz
            artifacts/claudex-x86_64-apple-darwin.tar.gz
            artifacts/claudex-x86_64-unknown-linux-gnu.tar.gz
            artifacts/claudex-aarch64-unknown-linux-gnu.tar.gz
            artifacts/SHA256SUMS
          body: |
            ## Install

            ### One-liner (macOS + Linux)

            ```bash
            curl -fsSL https://raw.githubusercontent.com/utensils/claudex/main/install.sh | sh
            ```

            ### Manual download

            Grab the tarball for your platform, verify the SHA256, and drop the binary on your `PATH`.

            | Platform | File |
            |----------|------|
            | macOS Apple Silicon | `claudex-aarch64-apple-darwin.tar.gz` |
            | macOS Intel | `claudex-x86_64-apple-darwin.tar.gz` |
            | Linux x86_64 | `claudex-x86_64-unknown-linux-gnu.tar.gz` |
            | Linux aarch64 | `claudex-aarch64-unknown-linux-gnu.tar.gz` |

            ```bash
            tar xzf claudex-<target>.tar.gz
            ./claudex --version
            ```

            ### Cargo

            ```bash
            cargo install --git https://github.com/utensils/claudex --tag ${{ github.event.inputs.tag || github.ref_name }}
            ```

            ### Nix flake

            ```bash
            nix run github:utensils/claudex -- --help
            nix profile install github:utensils/claudex
            ```
